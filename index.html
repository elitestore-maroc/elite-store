<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<title>Elite Store</title>

<style>

margin:0;
background:#f2f2f2;

}

header{
background:black;

}

.products{
display:flex;
flex-wrap:wrap;

button{

padding:20px;

<body>

<div class="products">

</div>

<div class="product">

<p>كاميرا مراقبة تعمل بالهاتف</p>

</div>

</div>

<footer>

</footer>

<script>
function order(){
window.open("https://wa.me/212680504853","_blank");
}
</script>

</html>
